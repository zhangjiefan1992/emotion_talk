name: emotion-talk-agentscope-spike

services:
  redis:
    image: redis:7-alpine
    container_name: emotion-talk-agentscope-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - agentscope_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: emotion-talk-agentscope-mysql
    environment:
      MYSQL_ROOT_PASSWORD: emotion_talk_root
      MYSQL_DATABASE: emotion_talk_spike
      MYSQL_USER: emotion_talk
      MYSQL_PASSWORD: emotion_talk_dev
    ports:
      - "127.0.0.1:13306:3306"
    volumes:
      - agentscope_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  agentscope_redis_data:
  agentscope_mysql_data:
