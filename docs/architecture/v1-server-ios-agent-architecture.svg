<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .sub { font: 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.4; rx: 18; }
      .group { fill: rgba(240, 247, 255, .6); stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; rx: 24; }
      .group2 { fill: rgba(241, 255, 246, .55); stroke: #86efac; stroke-width: 2; stroke-dasharray: 8 8; rx: 24; }
      .group3 { fill: rgba(255, 247, 237, .6); stroke: #fdba74; stroke-width: 2; stroke-dasharray: 8 8; rx: 24; }
      .label { font: 600 21px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .small { font: 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .tiny { font: 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .arrow { stroke: #111827; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowGray); }
      .accent { fill: #dbeafe; stroke: #2563eb; }
      .green { fill: #dcfce7; stroke: #16a34a; }
      .orange { fill: #ffedd5; stroke: #ea580c; }
      .purple { fill: #f3e8ff; stroke: #9333ea; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111827" stroke-width="2"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#64748b" stroke-width="2"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="70" y="72">V1 架构：iOS 实时听记 + 服务端多 Agent</text>
  <text class="sub" x="70" y="108">iOS 负责采集和展示；服务端负责数据、纪要、历史、专家团；录音文件进入 OSS。</text>

  <rect class="group" x="55" y="155" width="380" height="560"/>
  <text class="label" x="85" y="195">iOS 端</text>
  <rect class="box accent" x="95" y="230" width="290" height="78"/>
  <text class="label" x="125" y="262">开始 / 结束对话</text>
  <text class="small" x="125" y="288">一个主按钮，用户控制</text>

  <rect class="box" x="95" y="345" width="290" height="82"/>
  <text class="label" x="125" y="378">麦克风录音</text>
  <text class="small" x="125" y="404">生成 MP3 / AAC 文件</text>

  <rect class="box" x="95" y="464" width="290" height="96"/>
  <text class="label" x="125" y="497">百炼移动端 SDK</text>
  <text class="small" x="125" y="523">实时语音转文字</text>
  <text class="tiny" x="125" y="545">Paraformer realtime 候选</text>

  <rect class="box" x="95" y="600" width="290" height="78"/>
  <text class="label" x="125" y="632">实时转写展示</text>
  <text class="small" x="125" y="658">过程反馈，不是最终产物</text>

  <rect class="group2" x="520" y="155" width="560" height="650"/>
  <text class="label" x="550" y="195">服务端</text>
  <rect class="box green" x="565" y="230" width="210" height="82"/>
  <text class="label" x="592" y="262">API Service</text>
  <text class="small" x="592" y="288">账号 / Space / Recording</text>

  <rect class="box" x="825" y="230" width="210" height="82"/>
  <text class="label" x="852" y="262">Recording Session</text>
  <text class="small" x="852" y="288">本次对话状态</text>

  <rect class="box orange" x="565" y="360" width="210" height="98"/>
  <text class="label" x="592" y="392">AI 图文纪要</text>
  <text class="small" x="592" y="418">总览 / 章节 / 原话</text>
  <text class="tiny" x="592" y="440">DeepSeek / Qwen / Claude</text>

  <rect class="box" x="825" y="360" width="210" height="98"/>
  <text class="label" x="852" y="392">历史 + 画像</text>
  <text class="small" x="852" y="418">History Links</text>
  <text class="tiny" x="852" y="440">Space Profile</text>

  <rect class="box purple" x="565" y="512" width="210" height="108"/>
  <text class="label" x="592" y="544">专家团 Job</text>
  <text class="small" x="592" y="570">用户主动触发</text>
  <text class="tiny" x="592" y="592">输入快照冻结</text>

  <rect class="box" x="825" y="512" width="210" height="108"/>
  <text class="label" x="852" y="544">多 Agent Runtime</text>
  <text class="small" x="852" y="570">轻量编排</text>
  <text class="tiny" x="852" y="592">AgentScope 候选</text>

  <rect class="box" x="665" y="675" width="270" height="82"/>
  <text class="label" x="700" y="707">PostgreSQL</text>
  <text class="small" x="700" y="733">业务数据 / AI 产物 / 状态</text>

  <rect class="group3" x="1180" y="155" width="360" height="560"/>
  <text class="label" x="1210" y="195">外部能力</text>
  <rect class="box" x="1225" y="235" width="260" height="90"/>
  <text class="label" x="1255" y="267">百炼 ASR 服务</text>
  <text class="small" x="1255" y="293">SDK 直连实时识别</text>

  <rect class="box" x="1225" y="382" width="260" height="90"/>
  <text class="label" x="1255" y="414">阿里云 OSS</text>
  <text class="small" x="1255" y="440">私有录音文件</text>

  <rect class="box" x="1225" y="530" width="260" height="98"/>
  <text class="label" x="1255" y="562">LLM Provider</text>
  <text class="small" x="1255" y="588">DeepSeek / Qwen</text>
  <text class="tiny" x="1255" y="610">Claude / OpenAI-compatible</text>

  <path class="arrow" d="M240 308 L240 345"/>
  <path class="arrow" d="M240 427 L240 464"/>
  <path class="arrow" d="M240 560 L240 600"/>
  <path class="arrow" d="M385 505 C470 500, 500 282, 565 270"/>
  <text class="tiny" x="395" y="474">文字片段上报</text>

  <path class="arrow" d="M385 388 C585 380, 1000 405, 1225 425"/>
  <text class="tiny" x="650" y="350">结束后上传 MP3/AAC</text>

  <path class="dash" d="M775 270 L825 270"/>
  <path class="arrow" d="M775 409 L825 409"/>
  <path class="arrow" d="M930 458 L930 512"/>
  <path class="arrow" d="M775 566 L825 566"/>
  <path class="arrow" d="M930 620 L835 675"/>
  <path class="arrow" d="M670 620 L745 675"/>
  <path class="arrow" d="M670 458 L745 675"/>
  <path class="arrow" d="M930 458 L830 675"/>

  <path class="arrow" d="M385 268 C450 240, 500 230, 565 255"/>
  <text class="tiny" x="405" y="230">创建 session / 拿凭证</text>

  <path class="arrow" d="M385 512 C680 510, 1040 250, 1225 275"/>
  <text class="tiny" x="720" y="265">SDK 直连 ASR</text>

  <path class="arrow" d="M775 406 C910 405, 1080 575, 1225 580"/>
  <path class="arrow" d="M1035 566 C1110 570, 1160 580, 1225 580"/>
  <text class="tiny" x="1045" y="538">纪要 / 专家团调用</text>

  <path class="dash" d="M1355 472 C1320 760, 980 790, 805 756"/>
  <text class="tiny" x="1110" y="790">未来重新转写 / 重新生成</text>

  <text class="small" x="70" y="840">Legend: 实线 = 主链路；虚线 = 凭证/未来重生成/异步关联。数据归服务端管理，OSS 只保存私有音频对象。</text>
</svg>
