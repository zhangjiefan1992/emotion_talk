services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      EMOTION_TALK_LLM_PROVIDER: ${EMOTION_TALK_LLM_PROVIDER:-deepseek}
      EMOTION_TALK_ALLOW_HEURISTIC: ${EMOTION_TALK_ALLOW_HEURISTIC:-}
      EMOTION_TALK_DB_PATH: ${EMOTION_TALK_DB_PATH:-/data/emotion_talk.sqlite3}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api_data:
